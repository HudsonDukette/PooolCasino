kind = "web"
previewPath = "/"
title = "PoolCasino"
version = "1.0.0"
id = "artifacts/pool-casino"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23507

[services.development]
run = "pnpm --filter @workspace/pool-casino run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pool-casino", "run", "build" ]
publicDir = "artifacts/pool-casino/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23507"
BASE_PATH = "/"
